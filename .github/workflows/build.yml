name: Build locally

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    -  uses: actions/checkout@v4
    - name: Ensure docker compose build works
      run: |
        cp .env.example .env
        docker compose build
