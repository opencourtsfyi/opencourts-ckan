name: Build locally

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    -  uses: actions/checkout@v4
    - name: Build and Test
      run: |
        cp .env.example .env
        docker compose build
        # docker compose up -d
  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and Test
      run: |
        cp .env.example .env
        docker compose build
        # docker compose up -d
