name: Build locally

on:
  # Trigger the workflow on push or pull request,
  # but only for the master branch
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    -  uses: actions/checkout@v4
    - name: Build and Test
      run: |
        docker compose build
        # docker compose up -d
  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and Test
      run: |
        docker compose build
        # docker compose up -d
